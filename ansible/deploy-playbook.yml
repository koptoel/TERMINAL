- name: Deploy
  hosts: all
  gather_facts: yes
  vars:
    env_path: "{{ ansible_facts['env']['HOME'] }}/.env"

  tasks:
    - name: Log into GitHub Container Registry
      shell: "echo {{ registry_token }} | docker login ghcr.io -u {{ github_user }} --password-stdin"
      no_log: true 

    - name: Generate production .env file
      copy:
        dest: "{{ env_path }}"
        content: |-
          # Server config (Stałe z Ansible)
          ASPNETCORE_ENVIRONMENT=Development
          ASPNETCORE_URLS=http://*:5006
          Jwt__AccessTokenExpirationMinutes=60
          Jwt__RefreshTokenExpirationDays=7
          Jwt__Issuer=terminal
          Jwt__Audience=terminal-clients
          
          # Server config (Sekrety z GitHub)
          Jwt__SecretKey={{ jwt_secret }}
          Administrator__Email={{ admin_email }}
          Administrator__Password={{ admin_password }}

          # Postgres config
          POSTGRES_DB=terminal
          POSTGRES_USER=db_admin_terminal
          POSTGRES_PASSWORD={{ postgres_pass }}
          # Kluczowe: używamy nazwy kontenera 'terminal.postgres' jako hosta
          Postgres__ConnectionString="Host=terminal.postgres;Database=terminal;Username=db_admin_terminal;Password={{ postgres_pass }};Include Error Detail=true"

          # Telemetry config
          OTEL_EXPORTER_OTLP_ENDPOINT={{ otel_endpoint }}
          OTEL_EXPORTER_OTLP_HEADERS="authorization={{ otel_headers }}"
          OTEL_RESOURCE_ATTRIBUTES="{{ otel_attributes }}"
        mode: '0600'

    - name: Docker compose up
      shell: |
        export COMPOSE_INTERACTIVE_NO_CLI=1
        docker compose --ansi never --env-file {{ env_path }} -f {{ compose_image }} up -d --remove-orphans
      args:
        executable: /bin/bash
      async: 300
      poll: 5