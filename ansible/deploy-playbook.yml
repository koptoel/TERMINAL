- name: Deploy
  hosts: all

  tasks:
    - name: Log into GitHub Container Registry
      shell: "echo {{ registry_token }} | docker login ghcr.io -u {{ github_user }} --password-stdin"
      no_log: true 

    - name: Generate .env file from secrets
      copy:
        dest: "./.env"
        content: |
          ASPNETCORE_URLS={{ aspnetcore_urls }}
          Administrator__Email={{ admin_email }}
          Administrator__Password={{ admin_password }}
          OTEL_EXPORTER_OTLP_ENDPOINT={{ otel_endpoint }}
          OTEL_EXPORTER_OTLP_HEADERS={{ otel_headers }}
          OTEL_RESOURCE_ATTRIBUTES=hdx_token={{ hdx_token }},service.name=terminal-backend
        mode: '0600' 

    - name: Docker compose down
      shell: "docker compose --env-file .env -f {{ compose_image }} down"

    - name: Docker compose pull
      shell: "docker compose --env-file .env -f {{ compose_image }} pull"

    - name: Docker compose up
      shell: "docker compose --env-file .env -f {{ compose_image }} up -d"