- name: Deploy
  hosts: all
  gather_facts: yes

  tasks:
    - name: Log into GitHub Container Registry
      shell: "echo {{ registry_token }} | docker login ghcr.io -u {{ github_user }} --password-stdin"
      no_log: true 

    - name: Docker compose up
      shell: |
        export ASPNETCORE_ENVIRONMENT="Production"
        export ASPNETCORE_URLS="http://*:5006"
        export Jwt__SecretKey="{{ jwt_secret }}"
        export Postgres__ConnectionString="Host=database;Database=terminal;Username=db_admin_terminal;Password={{ postgres_pass }};Include Error Detail=true"
        export POSTGRES_PASSWORD="{{ postgres_pass }}"
        export POSTGRES_DB="terminal"
        export POSTGRES_USER="db_admin_terminal"
        export OTEL_ENDPOINT="{{ otel_endpoint }}"
        export OTEL_HEADERS="authorization={{ otel_headers }}"
        export OTEL_RESOURCE_ATTRIBUTES="{{ otel_attributes }}"
        
        export COMPOSE_INTERACTIVE_NO_CLI=1
        export COMPOSE_MENU=0
        
        yes | docker compose --ansi never -f {{ compose_image }} up -d --remove-orphans
      args:
        executable: /bin/bash
      register: compose_up
      ignore_errors: yes

    - name: Debug logs if failed
      shell: "docker logs terminal.server --tail 50"
      when: compose_up.rc != 0
      register: server_logs

    - name: Final check
      fail:
        msg: "Deployment failed! App logs: {{ server_logs.stdout }}"
      when: compose_up.rc != 0