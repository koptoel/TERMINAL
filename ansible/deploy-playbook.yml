- name: Deploy
  hosts: all
  gather_facts: yes
  vars:
    env_path: "{{ ansible_facts['env']['HOME'] }}/.env"

  tasks:
    - name: Log into GitHub Container Registry
      shell: "echo {{ registry_token }} | docker login ghcr.io -u {{ github_user }} --password-stdin"
      no_log: true 

    - name: Generate .env file from secrets
      copy:
        dest: "{{ env_path }}"
        content: |-
          ASPNETCORE_URLS="{{ aspnetcore_urls }}"
          Administrator__Email="{{ admin_email }}"
          Administrator__Password="{{ admin_password }}"
          Jwt__Issuer="{{ jwt_issuer }}"
          Jwt__Audience="{{ jwt_audience }}"
          Jwt__SecretKey="{{ jwt_key }}"
          Jwt__AccessTokenExpirationMinutes="{{ jwt_exp_min }}"
          Jwt__RefreshTokenExpirationDays="{{ jwt_exp_days }}"
          Postgres__ConnectionString="{{ postgres_conn }}"
          POSTGRES_USER="{{ postgres_user }}"
          POSTGRES_PASSWORD="{{ postgres_pass }}"
          POSTGRES_DB="{{ postgres_db }}"
          OTEL_ENDPOINT="{{ otel_endpoint }}"
          OTEL_HEADERS="{{ otel_headers }}"
          OTEL_RESOURCE_ATTRIBUTES="hdx_token={{ hdx_token }},service.name=terminal-backend"
        mode: '0600'

    - name: Docker compose down
      shell: "docker compose -f {{ compose_image }} down --remove-orphans"

    - name: Docker compose pull
      shell: "docker compose -f {{ compose_image }} pull"

    - name: Docker compose up
      shell: |
        set -a
        [ -f {{ env_path }} ] && . {{ env_path }}
        set +a
        export COMPOSE_INTERACTIVE_NO_CLI=1
        export COMPOSE_MENU=0
        yes | docker compose --ansi never -f {{ compose_image }} up -d --remove-orphans
      args:
        executable: /bin/bash