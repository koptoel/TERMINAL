- name: Deploy
  hosts: all
  gather_facts: yes
  vars:
    env_path: "{{ ansible_facts['env']['HOME'] }}/.env"

  tasks:
    - name: Log into GitHub Container Registry
      shell: "echo {{ registry_token }} | docker login ghcr.io -u {{ github_user }} --password-stdin"
      no_log: true 

    - name: Generate full .env file
      copy:
        dest: "{{ env_path }}"
        content: |-
          # Server config
          ASPNETCORE_ENVIRONMENT=Development
          ASPNETCORE_URLS=http://*:5006
          Jwt__Issuer=terminal
          Jwt__Audience=terminal-clients
          Jwt__SecretKey=[super-secret-key-for-development-purposes-only]
          Jwt__AccessTokenExpirationMinutes=15
          Jwt__RefreshTokenExpirationDays=30
          Postgres__ConnectionString="Host=database;Database=terminal;Username=root;Password=root;Include Error Detail=true"
          Administrator__Email=admin@terminal.com
          Administrator__Password=password

          # Postgres config
          POSTGRES_PASSWORD=root
          POSTGRES_DB=terminal
          POSTGRES_USER=root

          # Telemetry config
          OTEL_EXPORTER_OTLP_ENDPOINT="{{ otel_endpoint }}"
          OTEL_EXPORTER_OTLP_HEADERS="authorization={{ otel_headers }}"
          OTEL_RESOURCE_ATTRIBUTES="{{ otel_attributes }}"
        mode: '0600'

    - name: Docker compose up
      shell: |
        set -a
        . {{ env_path }}
        set +a
        export COMPOSE_INTERACTIVE_NO_CLI=1
        docker compose -f {{ compose_image }} pull
        docker compose --ansi never -f {{ compose_image }} up -d --remove-orphans
      args:
        executable: /bin/bash