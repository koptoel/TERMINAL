on:
  workflow_call:
    secrets:
      ssh-private-key:
        required: true
      ansible-user:
        required: true
      deployment-targets:
        required: true
      otel-endpoint:
        required: true
      otel-headers:
        required: true

jobs:
  deploy:
    name: Deploy Ansible Playbook
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          echo "${{ secrets.ssh-private-key }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Create Ansible inventory
        id: make-inventory
        uses: ./.github/actions/make-inventory
        with:
          host-list: ${{ secrets.deployment-targets }}
          group-name: web

      # Ansible jest preinstalowany na ubuntu-latest, 
      # ale zostawiamy, jeśli chcesz konkretną wersję z apt
      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible
          
      - name: Run Ansible Playbook
        env:
          ANSIBLE_USER: ${{ secrets.ansible-user }}
          ANSIBLE_HOST_KEY_CHECKING: false
          TMPDIR: "/home/${{ secrets.ansible-user }}/.ansible_tmp"
          TEMP: "/home/${{ secrets.ansible-user }}/.ansible_tmp"
          TMP: "/home/${{ secrets.ansible-user }}/.ansible_tmp"
          ANSIBLE_REMOTE_TMP: "/home/${{ secrets.ansible-user }}/.ansible_tmp"
          ANSIBLE_PIPELINING: "True"
          
        run: |
          # 1. Wyciągamy surowe dane z sekretu
          RAW_TARGET="${{ secrets.deployment-targets }}"
          
          # 2. Wycinamy samo IP (zakładając format name:ip:port)
          # Jeśli masz tam kilka hostów po przecinku, bierzemy pierwszy
          TARGET_IP=$(echo "$RAW_TARGET" | cut -d',' -f1 | cut -d':' -f2)
          
          # 3. Teraz SSH dostaje czyste IP
          ssh -o StrictHostKeyChecking=no -p 50022 -i private_key.pem ${{ secrets.ansible-user }}@$TARGET_IP "mkdir -p ~/.ansible_tmp && chmod 700 ~/.ansible_tmp"
          
          # 4. Ansible korzysta już z inventory.ini, który jest poprawnie zbudowany
          ansible-playbook -i inventory.ini ansible/deploy-playbook.yml \
            --extra-vars "compose_image=oci://ghcr.io/${{ github.repository_owner }}/terminal/compose:latest" \
            --extra-vars "registry_token=${{ secrets.GITHUB_TOKEN }}" \
            --extra-vars "github_user=${{ github.actor }}" \
            --private-key private_key.pem -u ${{ secrets.ansible-user }}

      - name: Cleanup
        if: always()
        run: rm -f private_key.pem
