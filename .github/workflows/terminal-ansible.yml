on:
  workflow_call:
    secrets:
      # Tutaj musimy wymienić WSZYSTKIE 11 sekretów, które przekazujesz z deploy.yml
      ssh-private-key: { required: true }
      ansible-user: { required: true }
      deployment-targets: { required: true }
      otel-endpoint: { required: true }
      otel-headers: { required: true }
      otel-attributes: { required: true }
      registry-token: { required: true }
      # Te cztery poniżej są kluczowe, żeby dane dotarły do Ansible:
      JWT_SECRET_KEY: { required: true }
      ADMIN_EMAIL: { required: true }
      ADMIN_PASSWORD: { required: true }
      POSTGRES_PASSWORD: { required: true }

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          echo "${{ secrets.ssh-private-key }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Create Ansible inventory
        id: make-inventory
        uses: ./.github/actions/make-inventory
        with:
          host-list: ${{ secrets.deployment-targets }}
          group-name: web

      - name: Install Ansible
        run: |
          python3 -m pip install --user ansible-core
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run Ansible Playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: false
          ANSIBLE_PIPELINING: "True"
          # SSH ARGS są teraz kompletne i bezpieczne dla GitHub Runnera
          ANSIBLE_SSH_ARGS: "-o StrictHostKeyChecking=no -o ControlMaster=auto -o ControlPersist=600s -o ServerAliveInterval=15 -o ServerAliveCountMax=10"
        run: |
          RAW_TARGET="${{ secrets.deployment-targets }}"
          TARGET_IP=$(echo "$RAW_TARGET" | cut -d',' -f1 | cut -d':' -f2)
          
          ansible-playbook -i inventory.ini ansible/deploy-playbook.yml \
            --extra-vars '{
              "compose_image": "oci://ghcr.io/${{ github.repository_owner }}/terminal/compose:latest",
              "registry_token": "${{ secrets.registry-token }}",
              "github_user": "${{ github.actor }}",
              "otel_endpoint": "${{ secrets.otel-endpoint }}",
              "otel_headers": "${{ secrets.otel-headers }}",
              "otel_attributes": "${{ secrets.otel-attributes }}",
              "jwt_secret": "${{ secrets.JWT_SECRET_KEY }}",
              "admin_email": "${{ secrets.ADMIN_EMAIL }}",
              "admin_password": "${{ secrets.ADMIN_PASSWORD }}",
              "postgres_pass": "${{ secrets.POSTGRES_PASSWORD }}"
            }' \
            --private-key private_key.pem -u ${{ secrets.ansible-user }}

      - name: Cleanup
        if: always()
        run: rm -f private_key.pem