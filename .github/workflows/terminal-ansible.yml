on:
  workflow_call:
    secrets:
      ssh-private-key: { required: true }
      ansible-user: { required: true }
      deployment-targets: { required: true }
      otel-endpoint: { required: true }
      otel-headers: { required: true }
      aspnetcore-urls: { required: true }
      admin-email: { required: true }
      admin-password: { required: true }
      hdx-token: { required: true }
      registry-token: { required: true }
      postgres-connection-string: { required: true }
      postgres-user: { required: true }
      postgres-password: { required: true }
      postgres-db: { required: true }
      jwt-issuer: { required: true }
      jwt-audience: { required: true }
      jwt-secret-key: { required: true }
      jwt-access-token-expiration: { required: true }
      jwt-refresh-token-expiration: { required: true }

jobs:
  deploy:
    name: Deploy Ansible Playbook
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          echo "${{ secrets.ssh-private-key }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Create Ansible inventory
        id: make-inventory
        uses: ./.github/actions/make-inventory
        with:
          host-list: ${{ secrets.deployment-targets }}
          group-name: web

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible
          
      - name: Verify Secrets Presence
        run: |
          echo "Checking secret variables..."
          if [ -n "${{ secrets.otel-endpoint }}" ]; then
            echo "otel-endpoint is present (masked)"
          else
            echo "otel-endpoint is EMPTY!"
          fi

      - name: Run Ansible Playbook
        env:
          ANSIBLE_USER: ${{ secrets.ansible-user }}
          ANSIBLE_HOST_KEY_CHECKING: false
          TMPDIR: "/home/${{ secrets.ansible-user }}/.ansible_tmp"
          TEMP: "/home/${{ secrets.ansible-user }}/.ansible_tmp"
          TMP: "/home/${{ secrets.ansible-user }}/.ansible_tmp"
          ANSIBLE_REMOTE_TMP: "/home/${{ secrets.ansible-user }}/.ansible_tmp"
          ANSIBLE_PIPELINING: "True"
          
        run: |
          # 1. Extract raw data from the secret
          RAW_TARGET="${{ secrets.deployment-targets }}"
          
          # 2. Extract the IP address
          TARGET_IP=$(echo "$RAW_TARGET" | cut -d',' -f1 | cut -d':' -f2)
          
          # 3. Prepare remote tmp dir
          ssh -o StrictHostKeyChecking=no -p 50022 -i private_key.pem ${{ secrets.ansible-user }}@$TARGET_IP "mkdir -p ~/.ansible_tmp && chmod 700 ~/.ansible_tmp"
          
          # 4. Run Playbook with all 19 secrets
          ansible-playbook -i inventory.ini ansible/deploy-playbook.yml \
            --extra-vars "compose_image=oci://ghcr.io/${{ github.repository_owner }}/terminal/compose:latest" \
            --extra-vars "registry_token=${{ secrets.registry-token }}" \
            --extra-vars "github_user=${{ github.actor }}" \
            --extra-vars "otel_endpoint=${{ secrets.otel-endpoint }}" \
            --extra-vars "otel_headers=${{ secrets.otel-headers }}" \
            --extra-vars "hdx_token=${{ secrets.hdx-token }}" \
            --extra-vars "aspnetcore_urls=${{ secrets.aspnetcore-urls }}" \
            --extra-vars "admin_email=${{ secrets.admin-email }}" \
            --extra-vars "admin_password=${{ secrets.admin-password }}" \
            --extra-vars "postgres_conn=${{ secrets.postgres-connection-string }}" \
            --extra-vars "postgres_user=${{ secrets.postgres-user }}" \
            --extra-vars "postgres_pass=${{ secrets.postgres-password }}" \
            --extra-vars "postgres_db=${{ secrets.postgres-db }}" \
            --extra-vars "jwt_issuer=${{ secrets.jwt-issuer }}" \
            --extra-vars "jwt_audience=${{ secrets.jwt-audience }}" \
            --extra-vars "jwt_key=${{ secrets.jwt-secret-key }}" \
            --extra-vars "jwt_exp_min=${{ secrets.jwt-access-token-expiration }}" \
            --extra-vars "jwt_exp_days=${{ secrets.jwt-refresh-token-expiration }}" \
            --private-key private_key.pem -u ${{ secrets.ansible-user }}

      - name: Cleanup
        if: always()
        run: rm -f private_key.pem