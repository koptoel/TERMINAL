name: Build and Deploy

on:
  workflow_run:
    workflows: ["Create release from tag"]
    types: [completed]
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip Docker build and push?'
        type: boolean
        default: false

jobs:
  # 1. Job to check for changes
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - 'Dockerfile'
              - '.github/workflows/terminal-docker.yml'

  # 2. Image build job (runs only if backend changed or triggered manually)
  build-and-push-images:
    needs: changes
    if: ${{ (needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch') && inputs.skip_build == false }}
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/terminal-docker.yml
    with:
      registry-url: ghcr.io
      registry-username: ${{ github.actor }}
    secrets:
      registry-token: ${{ secrets.GITHUB_TOKEN }}

  # 3. Deployment job (runs if build succeeds OR is skipped)
  deploy:
    needs: [changes, build-and-push-images]
    if: |
      always() && 
      (needs.build-and-push-images.result == 'success' || needs.build-and-push-images.result == 'skipped') &&
      needs.changes.result == 'success'
    uses: ./.github/workflows/terminal-ansible.yml
    secrets:
      ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      ansible-user: ${{ secrets.ANSIBLE_USER }}
      deployment-targets: ${{ secrets.DEPLOYMENT_TARGETS }}
      otel-endpoint: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
      otel-headers: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
      otel-attributes: ${{ secrets.OTEL_RESOURCE_ATTRIBUTES }}
      registry-token: ${{ secrets.GITHUB_TOKEN }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}